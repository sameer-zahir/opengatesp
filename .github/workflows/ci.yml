name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $all = @()
          foreach ($p in 'module', 'gui', 'scripts', 'mcp-server') {
            $all += Invoke-ScriptAnalyzer -Path "./$p" -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          }
          if ($all) {
            $all | Format-Table Severity, RuleName, ScriptName, Line -AutoSize
            throw "PSScriptAnalyzer found $($all.Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer: clean."

      - name: Pester (pure helpers)
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
